name: Update YouTube Videos

on:
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-youtube:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest YouTube videos
        run: node scripts/fetch-youtube.mjs

      - name: Commit changes
        run: |
          if git diff --quiet src/data/videos.generated.json; then
            echo "No YouTube video changes."
            exit 0
          fi
          git config user.name "Do Stuff Bot"
          git config user.email "georgeandjohnmcp@gmail.com"
          git add src/data/videos.generated.json
          git commit -m "Update YouTube videos"
          git push
